<!doctype html>
<html class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeeJai Bistro - Tavern Entrance</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DotGothic16&display=swap');

    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden;
      background-color: #0c0714;
    }

    /* 結合英文像素字體與日系/中文像素字體 */
    * {
      font-family: 'Press Start 2P', 'DotGothic16', monospace;
      image-rendering: pixelated;
    }

    /* 經典 JRPG 藍底白邊對話框 */
    .jrpg-dialog {
      border: 4px solid #fff;
      box-shadow: 
        0 0 0 4px #111,
        inset 0 0 0 2px #fff,
        inset 0 0 0 4px #000;
      background: linear-gradient(180deg, #0a1040 0%, #03051e 100%);
    }

    /* 像素按鈕 */
    .pixel-btn {
      position: relative;
      border: 3px solid #fff;
      box-shadow: 3px 3px 0 #000;
      transition: all 0.05s ease;
    }
    .pixel-btn:active {
      transform: translate(3px, 3px);
      box-shadow: 0px 0px 0 #000;
    }

    /* CRT 電視掃描線效果 */
    .crt::after {
      content: " ";
      display: block;
      position: absolute;
      top: 0; left: 0; bottom: 0; right: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
      aspect-ratio: auto;
      background-size: 100% 4px, 6px 100%;
      pointer-events: none;
      z-index: 99;
    }

    /* 搖晃與漂浮動畫 */
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
    }
    .float-anim {
      animation: float 3s ease-in-out infinite;
    }

    @keyframes pulse-light {
      0%, 100% { opacity: 0.6; box-shadow: 0 0 8px rgba(234, 179, 8, 0.4); }
      50% { opacity: 1; box-shadow: 0 0 20px rgba(234, 179, 8, 0.8); }
    }
    .tavern-lantern {
      animation: pulse-light 2s infinite;
    }

    /* 星星閃爍 */
    @keyframes pixel-blink {
      0%, 100% { opacity: 0.2; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }
    .pixel-star {
      position: absolute;
      width: 6px;
      height: 6px;
      background: #ffe066;
      box-shadow: 0 0 4px #ffe066;
      animation: pixel-blink 2.5s step-end infinite;
    }

    /* 文字游標閃爍 */
    @keyframes cursor-blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    .dialog-cursor {
      display: inline-block;
      width: 12px;
      height: 12px;
      background-color: #ffe066;
      vertical-align: middle;
      margin-left: 4px;
      animation: cursor-blink 0.8s step-end infinite;
    }

    /* 淡出轉場效果 */
    .fade-out {
      animation: fadeToBlack 1s ease-in-out forwards;
    }
    @keyframes fadeToBlack {
      to {
        opacity: 0;
        transform: scale(0.95);
      }
    }
  </style>
</head>
<body class="w-full h-full text-[#e0e0e0] crt relative flex flex-col justify-center items-center p-4 select-none">

  <!-- 背景點綴：星空 -->
  <div class="absolute inset-0 pointer-events-none overflow-hidden z-0">
    <div class="pixel-star" style="top:15%; left:10%; animation-delay:0.2s"></div>
    <div class="pixel-star" style="top:25%; left:80%; animation-delay:0.8s"></div>
    <div class="pixel-star" style="top:48%; left:5%; animation-delay:1.5s"></div>
    <div class="pixel-star" style="top:70%; left:88%; animation-delay:0.5s"></div>
    <div class="pixel-star" style="top:85%; left:20%; animation-delay:1.1s"></div>
  </div>

  <!-- 主容器 -->
  <div id="portal-app" class="w-full max-w-lg z-10 flex flex-col items-center gap-6">

    <!-- 酒館招牌與場景 -->
    <div class="text-center float-anim mb-4">
      <div class="inline-block px-4 py-1.5 bg-purple-950/80 border-2 border-purple-500 text-purple-300 text-[10px] tracking-widest font-bold uppercase mb-3 rounded">
        🍺 LOCAL INN & TAVERN 🍺
      </div>
      
      <!-- 迪宅酒館招牌 -->
      <div class="jrpg-dialog p-4 border-[#854d0e] bg-amber-950/90 relative max-w-[340px] mx-auto rounded-md shadow-2xl">
        <div class="absolute -top-3 left-1/2 -translate-x-1/2 bg-yellow-500 tavern-lantern w-3 h-3 rounded-full"></div>
        <h1 class="text-sm md:text-base font-extrabold text-[#ffe066] tracking-wider drop-shadow-[0_2px_0_rgba(0,0,0,1)]">
          迪宅 DEEJAI BISTRO
        </h1>
        <div class="mt-1.5 border-t border-dashed border-amber-800/60 pt-1 flex justify-center gap-4 text-[9px] text-amber-200">
          <span>EST. 2026</span>
          <span>●</span>
          <span>GUILD HQ</span>
        </div>
      </div>
    </div>

    <!-- 門口NPC (掌櫃) -->
    <div class="relative flex items-center justify-center my-2 h-24">
      <!-- 傳送門或溫暖黃光 -->
      <div class="absolute w-28 h-28 bg-yellow-600/20 rounded-full blur-xl animate-pulse"></div>
      
      <!-- 掌櫃 NPC Emoji/像素拼貼 -->
      <div class="relative z-10 flex flex-col items-center">
        <div class="text-5xl select-none filter drop-shadow-[0_4px_4px_rgba(0,0,0,0.5)]">🧔</div>
        <div class="mt-2 px-2 py-0.5 bg-black/80 border border-slate-600 rounded text-[9px] text-slate-400 font-bold tracking-widest">
          酒館掌櫃 (NPC)
        </div>
      </div>
    </div>

    <!-- JRPG 經典對話框 -->
    <div class="w-full jrpg-dialog p-4 md:p-5 relative min-h-[140px] flex flex-col justify-between">
      
      <!-- 說話者名字標籤 -->
      <div class="absolute -top-3.5 left-4 bg-[#0a1040] border-2 border-white px-3 py-0.5 text-[10px] text-[#ffe066] font-bold tracking-widest uppercase">
        掌櫃 迪宅
      </div>

      <!-- 對話文字內容 -->
      <div class="text-xs md:text-sm leading-relaxed text-white pr-2 mt-2" id="dialog-text">
        <!-- 這裡會由 JS 打字機動態填入 -->
      </div>

      <!-- 下一步小三角形指示器 -->
      <div class="text-right h-4 select-none">
        <span class="inline-block text-[#ffe066] animate-bounce text-[10px] mr-1" id="next-indicator" style="display:none;">▼</span>
      </div>
    </div>

    <!-- 勇者指令選單 (行動方案) -->
    <div class="w-full space-y-3" id="choices-container" style="visibility: hidden;">
      <button onclick="handleChoice('enter')" class="pixel-btn w-full p-3.5 text-left text-xs bg-emerald-950 hover:bg-emerald-900 text-emerald-400 border-emerald-500 rounded flex items-center justify-between group transition-all">
        <span class="flex items-center gap-2">
          <span class="text-amber-400 group-hover:translate-x-1 transition-transform">▶</span>
          遞上「同學會邀請函」(進入 RSVP)
        </span>
        <span class="text-[9px] text-emerald-600 uppercase tracking-widest">[ LEVEL 99 QUEST ]</span>
      </button>

      <button onclick="handleChoice('info')" class="pixel-btn w-full p-3.5 text-left text-xs bg-slate-900 hover:bg-slate-800 text-slate-300 border-slate-600 rounded flex items-center gap-2 group transition-all">
        <span class="text-amber-400 group-hover:translate-x-1 transition-transform">▶</span>
        打聽關於這個「酒館任務」的細節
      </button>

      <button onclick="handleChoice('leave')" class="pixel-btn w-full p-3.5 text-left text-xs bg-rose-950 hover:bg-rose-900 text-rose-400 border-rose-800 rounded flex items-center gap-2 group transition-all">
        <span class="text-amber-400 group-hover:translate-x-1 transition-transform">▶</span>
        沒事，只是路過看看 (隨便逛逛)
      </button>
    </div>

  </div>

  <!-- 底部版權宣示 -->
  <div class="mt-8 text-center z-10 text-[9px] text-slate-600 tracking-widest">
    ▲ CLICK TO HEAR THE retro 8-BIT TAVERN SOUNDS ▲
  </div>

  <script>
    // --- 8-Bit 音效合成器 (Web Audio API) ---
    const AudioEngine = {
      ctx: null,

      init() {
        if (!this.ctx) {
          this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        }
      },

      // 打字時的嘟嘟聲
      playBlip() {
        try {
          this.init();
          const now = this.ctx.currentTime;
          const osc = this.ctx.createOscillator();
          const gain = this.ctx.createGain();

          osc.type = 'triangle';
          osc.frequency.setValueAtTime(450 + Math.random() * 80, now); // 微幅音高抖動，聽起來更像 NPC 人聲

          gain.gain.setValueAtTime(0.04, now);
          gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);

          osc.connect(gain);
          gain.connect(this.ctx.destination);
          osc.start(now);
          osc.stop(now + 0.06);
        } catch (e) {
          // 靜音 fallback
        }
      },

      // 游標選單點擊音
      playSelect() {
        try {
          this.init();
          const now = this.ctx.currentTime;
          const osc = this.ctx.createOscillator();
          const gain = this.ctx.createGain();

          osc.type = 'square';
          osc.frequency.setValueAtTime(350, now);
          osc.frequency.setValueAtTime(550, now + 0.06);

          gain.gain.setValueAtTime(0.08, now);
          gain.gain.exponentialRampToValueAtTime(0.01, now + 0.12);

          osc.connect(gain);
          gain.connect(this.ctx.destination);
          osc.start(now);
          osc.stop(now + 0.14);
        } catch (e) {}
      },

      // 退回/驚嚇音效
      playSigh() {
        try {
          this.init();
          const now = this.ctx.currentTime;
          const osc = this.ctx.createOscillator();
          const gain = this.ctx.createGain();

          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(200, now);
          osc.frequency.linearRampToValueAtTime(120, now + 0.3);

          gain.gain.setValueAtTime(0.08, now);
          gain.gain.exponentialRampToValueAtTime(0.01, now + 0.35);

          osc.connect(gain);
          gain.connect(this.ctx.destination);
          osc.start(now);
          osc.stop(now + 0.35);
        } catch (e) {}
      },

      // 進入傳送/打開大門音效
      playEnterPortal() {
        try {
          this.init();
          const now = this.ctx.currentTime;
          const duration = 0.6;
          
          // 琶音和弦升天音效 (傳送門開啟)
          const notes = [261.6, 329.6, 392.0, 523.3, 659.3, 784.0, 1046.5];
          notes.forEach((freq, idx) => {
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            const startTime = now + idx * 0.06;

            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, startTime);
            osc.frequency.exponentialRampToValueAtTime(freq * 1.5, startTime + 0.2);

            gain.gain.setValueAtTime(0.08, startTime);
            gain.gain.exponentialRampToValueAtTime(0.01, startTime + 0.25);

            osc.connect(gain);
            gain.connect(this.ctx.destination);
            osc.start(startTime);
            osc.stop(startTime + 0.3);
          });
        } catch (e) {}
      }
    };

    // --- JRPG 打字機核心邏輯 ---
    const script = {
      welcome: "「歡迎光臨迪宅酒館！這裡聚集了各路頂尖的冒險者與勇士... 嗯？我看你骨骼清奇，身上有一封泛著金色微光的『同學會邀請函』？難道，你就是預言中的老同學嗎？」",
      aboutQuest: "「哦！你問這個任務？這可是時隔多年的傳奇限定戰役！據說，我們將在『2026/10/?? 11:00』於『迪宅DeeJai Bistro』這個神秘地城會合，共同討伐名為『同學會』的史詩級副本！聽說現場還備有美味佳釀與豐富冒險經費（AA分攤）呢！」",
      leaveWarning: "「哎呀，別走啊！外面夜深怪多，不如進來喝一杯，遞上你的作戰計畫書，與當年的夥伴們一起重組工會吧！」"
    };

    let typingTimer = null;
    let isTyping = false;

    function typeMessage(text, callback) {
      clearInterval(typingTimer);
      isTyping = true;
      const displayEl = document.getElementById('dialog-text');
      const nextIndicator = document.getElementById('next-indicator');
      const choicesContainer = document.getElementById('choices-container');
      
      displayEl.innerHTML = "";
      nextIndicator.style.display = "none";
      choicesContainer.style.visibility = "hidden";

      let index = 0;
      
      typingTimer = setInterval(() => {
        if (index < text.length) {
          const char = text[index];
          displayEl.innerHTML += char;
          index++;
          
          // 每打兩個字發出一次經典 8-Bit 嗶嗶語音音效
          if (index % 2 === 0) {
            AudioEngine.playBlip();
          }
        } else {
          clearInterval(typingTimer);
          isTyping = false;
          displayEl.innerHTML += `<span class="dialog-cursor"></span>`;
          nextIndicator.style.display = "inline-block";
          choicesContainer.style.visibility = "visible";
          if (callback) callback();
        }
      }, 45); // 順暢舒適的打字速度
    }

    // --- 勇者指令點擊回饋處理 ---
    function handleChoice(action) {
      if (isTyping) return; // 說話時禁止重複觸發

      if (action === 'enter') {
        AudioEngine.playEnterPortal();
        
        // JRPG 經典轉場淡出動畫
        const appEl = document.getElementById('portal-app');
        appEl.classList.add('fade-out');

        // 延遲轉址，讓傳送琶音與淡出效果完整釋放
        setTimeout(() => {
          window.location.href = "rpg_reunion_rsvp.html";
        }, 850);

      } else if (action === 'info') {
        AudioEngine.playSelect();
        typeMessage(script.aboutQuest);

      } else if (action === 'leave') {
        AudioEngine.playSigh();
        typeMessage(script.leaveWarning);
      }
    }

    // 點擊頁面任何地方先啟用瀏覽器音訊上下文 (AudioContext Policy)
    document.addEventListener('click', () => {
      AudioEngine.init();
    }, { once: true });

    // 初始化開始打字
    window.addEventListener('DOMContentLoaded', () => {
      // 確保一開始就觸發掌櫃講話
      setTimeout(() => {
        typeMessage(script.welcome);
      }, 500);
    });
  </script>
</body>
</html>
